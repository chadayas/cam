<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Door Cam</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0f0f0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            font-family: monospace;
        }

        img {
            width: 100%;
            max-width: 800px;
            border: 1px solid #333;
        }

        .servo-buttons {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        button {
            background-color: #1a1a1a;
            color: #ffffff;
            border: 1px solid #333;
            padding: 10px 24px;
            font-family: monospace;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
        }

        button:hover {
            border-color: #555;
        }
    </style>
</head>
<body>
    <img src="http://192.168.1.191:81/stream" />
    <div class="servo-buttons">
        <button onclick="fetch('/servo?cmd=left')">Left</button>
        <button onclick="fetch('/servo?cmd=right')">Right</button>
    </div>
    <script>
        function sendCmd(cmd) {
            fetch('/servo?cmd=' + cmd);
        }
    </script>
</body>
</html>
